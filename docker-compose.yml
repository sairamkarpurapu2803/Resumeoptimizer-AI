version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: backend

    restart: always

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app

volumes:
  postgres_data:
